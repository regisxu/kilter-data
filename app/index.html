<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kilterboard Logbook</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/sql.js/1.8.0/sql-wasm.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/echarts/5.4.3/echarts.min.js"></script>
</head>
<body>
    <div id="app">
        <!-- 加载界面 -->
        <div id="loading-screen" class="screen">
            <div class="loading-content">
                <h1>🧗 Kilterboard</h1>
                <p>记录每一次攀岩的成长</p>
                <div class="file-input-wrapper">
                    <input type="file" id="db-file-input" accept=".db,.sqlite,.sqlite3" />
                    <button class="btn-primary" onclick="document.getElementById('db-file-input').click()">
                        📁 选择数据库文件
                    </button>
                </div>
                <p class="hint">支持 .db, .sqlite, .sqlite3 格式</p>
                <div id="loading-status"></div>
            </div>
        </div>

        <!-- 主界面 -->
        <div id="main-screen" class="screen">
            <!-- 头部 -->
            <header class="app-header">
                <h1>🧗 Logbook</h1>
                <div class="header-stats">
                    <span id="total-count">0 条记录</span>
                    <button class="btn-icon" onclick="showStatsPage()" title="统计分析">📊</button>
                    <button class="btn-icon" onclick="reloadDatabase()" title="重新加载">🔄</button>
                </div>
            </header>

            <!-- 统计页面 -->
            <div id="stats-page" class="stats-page">
                <div class="stats-header">
                    <h2>📊 统计分析</h2>
                    <button class="btn-icon" onclick="hideStatsPage()">✕</button>
                </div>
                
                <!-- Tab切换 -->
                <div class="stats-tabs">
                    <div class="stats-tab active" data-tab="overview" onclick="switchStatsTab('overview')">概览</div>
                    <div class="stats-tab" data-tab="grade" onclick="switchStatsTab('grade')">难度分析</div>
                    <div class="stats-tab" data-tab="trend" onclick="switchStatsTab('trend')">趋势分析</div>
                    <div class="stats-tab" data-tab="sql" onclick="switchStatsTab('sql')">SQL探索</div>
                </div>
                
                <!-- 概览Tab -->
                <div id="stats-overview" class="stats-content active">
                    <!-- KPI卡片 -->
                    <div class="kpi-cards">
                        <div class="kpi-card">
                            <div class="kpi-value" id="kpi-total">0</div>
                            <div class="kpi-label">总攀爬</div>
                        </div>
                        <div class="kpi-card ascent">
                            <div class="kpi-value" id="kpi-ascent">0</div>
                            <div class="kpi-label">完攀数</div>
                        </div>
                        <div class="kpi-card bid">
                            <div class="kpi-value" id="kpi-bid">0</div>
                            <div class="kpi-label">尝试数</div>
                        </div>
                        <div class="kpi-card flash">
                            <div class="kpi-value" id="kpi-flash">0</div>
                            <div class="kpi-label">Flash数</div>
                        </div>
                        <div class="kpi-card">
                            <div class="kpi-value" id="kpi-max-grade">-</div>
                            <div class="kpi-label">最高难度</div>
                        </div>
                    </div>
                    
                    <!-- 图表区 -->
                    <div class="stats-charts">
                        <div class="chart-container">
                            <h3>完攀/尝试分布</h3>
                            <div id="chart-overview-pie" class="chart"></div>
                        </div>
                        <div class="chart-container">
                            <h3>角度分布</h3>
                            <div id="chart-overview-angle" class="chart"></div>
                        </div>
                        <div class="chart-container full-width">
                            <h3>近6个月活动趋势</h3>
                            <div id="chart-overview-trend" class="chart"></div>
                        </div>
                    </div>
                </div>
                
                <!-- 难度分析Tab -->
                <div id="stats-grade" class="stats-content">
                    <div class="stats-charts">
                        <div class="chart-container full-width">
                            <h3>难度金字塔</h3>
                            <div id="chart-grade-pyramid" class="chart"></div>
                        </div>
                        <div class="chart-container full-width">
                            <h3>各难度完攀率</h3>
                            <div id="chart-grade-rate" class="chart"></div>
                        </div>
                        <div class="chart-container full-width">
                            <h3>尝试次数分布</h3>
                            <div id="chart-bid-distribution" class="chart"></div>
                        </div>
                    </div>
                </div>
                
                <!-- 趋势分析Tab -->
                <div id="stats-trend" class="stats-content">
                    <div class="trend-controls">
                        <div class="trend-granularity">
                            <button class="granularity-btn active" data-gran="week" onclick="setTrendGranularity('week')">周</button>
                            <button class="granularity-btn" data-gran="month" onclick="setTrendGranularity('month')">月</button>
                            <button class="granularity-btn" data-gran="year" onclick="setTrendGranularity('year')">年</button>
                        </div>
                    </div>
                    <div class="stats-charts">
                        <div class="chart-container full-width">
                            <h3>攀爬活动热力图</h3>
                            <div id="chart-trend-heatmap" class="chart"></div>
                        </div>
                        <div class="chart-container full-width">
                            <h3>攀爬次数与平均难度趋势</h3>
                            <div id="chart-trend-line" class="chart"></div>
                        </div>
                        <div class="chart-container full-width">
                            <h3>星期/时段偏好</h3>
                            <div id="chart-trend-weekday" class="chart"></div>
                        </div>
                    </div>
                </div>
                
                <!-- SQL探索Tab -->
                <div id="stats-sql" class="stats-content">
                    <div class="sql-panel">
                        <div class="sql-templates">
                            <label>常用查询模板：</label>
                            <select id="sql-template" onchange="loadSqlTemplate()">
                                <option value="">自定义查询...</option>
                                <option value="grade_distribution">难度分布</option>
                                <option value="monthly_stats">月度统计</option>
                                <option value="setter_ranking">定线员榜</option>
                                <option value="project_list">项目攻坚列表(尝试>5次未完攀)</option>
                                <option value="repeat_climbs">复攀统计</option>
                            </select>
                        </div>
                        <textarea id="sql-input" class="sql-input" placeholder="输入 SQL 查询语句..."></textarea>
                        <div class="sql-actions">
                            <button class="btn-primary" onclick="executeSqlQuery()">▶ 执行查询</button>
                            <button class="btn-secondary" onclick="exportSqlResult()">📤 导出结果</button>
                        </div>
                        <div id="sql-result" class="sql-result">
                            <div class="sql-placeholder">请输入 SQL 查询或选择模板</div>
                        </div>
                        <div class="sql-chart-container" id="sql-chart-container" style="display: none;">
                            <h4>可视化结果</h4>
                            <div id="chart-sql-result" class="chart"></div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Filter Bar -->
            <div id="filter-bar" class="filter-bar">
                <div class="filter-bar-item" onclick="showFilterPanel()">
                    <span class="filter-label">时间</span>
                    <span id="filter-bar-time" class="filter-value">全部</span>
                </div>
                <div class="filter-bar-item" onclick="showFilterPanel()">
                    <span class="filter-label">类型</span>
                    <span id="filter-bar-type" class="filter-value">全部</span>
                </div>
                <div class="filter-bar-item" onclick="showFilterPanel()">
                    <span class="filter-label">角度</span>
                    <span id="filter-bar-angle" class="filter-value">全部</span>
                </div>
                <div class="filter-bar-item" onclick="showFilterPanel()">
                    <span class="filter-label">难度</span>
                    <span id="filter-bar-diff" class="filter-value">全部</span>
                </div>
                <div class="filter-bar-item" onclick="showFilterPanel()">
                    <span class="filter-label">线路</span>
                    <span id="filter-bar-name" class="filter-value">全部</span>
                </div>
                <button class="btn-icon filter-btn" onclick="showFilterPanel()">🔍</button>
            </div>

            <!-- 筛选面板 -->
            <div id="filter-panel" class="filter-panel">
                <div class="filter-group">
                    <label>时间范围</label>
                    <select id="filter-time" onchange="onTimeFilterChange()">
                        <option value="all">全部时间</option>
                        <option value="7">最近7天</option>
                        <option value="30">最近30天</option>
                        <option value="90">最近90天</option>
                        <option value="365">最近一年</option>
                        <option value="2026">2026年</option>
                        <option value="2025">2025年</option>
                        <option value="2024">2024年</option>
                        <option value="2023">2023年</option>
                        <option value="2022">2022年</option>
                        <option value="custom">自定义...</option>
                    </select>
                    <div id="custom-date-range" class="custom-date-range" style="display: none;">
                        <input type="date" id="date-start" onchange="applyFilters()">
                        <span>至</span>
                        <input type="date" id="date-end" onchange="applyFilters()">
                    </div>
                </div>

                <div class="filter-group">
                    <label>记录类型</label>
                    <div class="checkbox-group">
                        <label><input type="checkbox" id="filter-ascent" checked onchange="applyFilters()"> ✅ 完攀 (Ascent)</label>
                        <label><input type="checkbox" id="filter-bid" checked onchange="applyFilters()"> 🔄 尝试 (Bid)</label>
                    </div>
                </div>

                <div class="filter-group">
                    <label>角度 (0°-70°)</label>
                    <div class="checkbox-group angles">
                        <label><input type="checkbox" value="0" checked onchange="applyFilters()"> 0°</label>
                        <label><input type="checkbox" value="5" checked onchange="applyFilters()"> 5°</label>
                        <label><input type="checkbox" value="10" checked onchange="applyFilters()"> 10°</label>
                        <label><input type="checkbox" value="15" checked onchange="applyFilters()"> 15°</label>
                        <label><input type="checkbox" value="20" checked onchange="applyFilters()"> 20°</label>
                        <label><input type="checkbox" value="25" checked onchange="applyFilters()"> 25°</label>
                        <label><input type="checkbox" value="30" checked onchange="applyFilters()"> 30°</label>
                        <label><input type="checkbox" value="35" checked onchange="applyFilters()"> 35°</label>
                        <label><input type="checkbox" value="40" checked onchange="applyFilters()"> 40°</label>
                        <label><input type="checkbox" value="45" checked onchange="applyFilters()"> 45°</label>
                        <label><input type="checkbox" value="50" checked onchange="applyFilters()"> 50°</label>
                        <label><input type="checkbox" value="55" checked onchange="applyFilters()"> 55°</label>
                        <label><input type="checkbox" value="60" checked onchange="applyFilters()"> 60°</label>
                        <label><input type="checkbox" value="65" checked onchange="applyFilters()"> 65°</label>
                        <label><input type="checkbox" value="70" checked onchange="applyFilters()"> 70°</label>
                    </div>
                </div>

                <div class="filter-group">
                    <label>难度范围</label>
                    <div class="diff-range-slider">
                        <div class="diff-range-labels">
                            <span id="diff-min-label">4a/V0</span>
                            <span id="diff-max-label">8c+/V16+</span>
                        </div>
                        <div class="range-inputs">
                            <input type="range" id="diff-min" min="10" max="33" value="10" oninput="onDiffChange()">
                            <input type="range" id="diff-max" min="10" max="33" value="33" oninput="onDiffChange()">
                        </div>
                    </div>
                </div>

                <div class="filter-group">
                    <label>搜索线路</label>
                    <input type="text" id="filter-search" placeholder="输入线路名称..." oninput="applyFilters()">
                </div>

                <button class="btn-secondary" onclick="resetFilters()">重置筛选</button>
                <button class="btn-close" onclick="hideFilterPanel()">✕</button>
            </div>

            <!-- 记录列表 -->
            <div id="record-list" class="record-list">
                <!-- 动态生成 -->
            </div>

            <!-- 加载更多 -->
            <div id="load-more" class="load-more" onclick="loadMore()">
                <span>加载更多...</span>
            </div>
        </div>

        <!-- 详情弹窗 -->
        <div id="detail-modal" class="modal" onclick="closeModal(event)">
            <div class="modal-content" onclick="event.stopPropagation()">
                <button class="modal-close" onclick="closeModal()">✕</button>
                <div id="modal-body">
                    <!-- 动态生成 -->
                </div>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
